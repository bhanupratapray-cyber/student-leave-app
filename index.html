            <input type="date" id="startDate" name="startDate" required>
        </div>

        <div class="form-group">
            <label for="endDate">Leave End Date:</label>
            <input type="date" id="endDate" name="endDate" required>
        </div>

        <button type="submit">Submit Leave</button>
    </form>

    <script>
        document.getElementById('leaveForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            // This splits the "Name|EnrollmentNumber" value from the dropdown
            const studentData = document.getElementById('student').value.split('|');
            const studentName = studentData[0];
            const enrollmentNo = studentData[1];
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            // Your live Google Apps Script URL
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwb8MN_s2XrDWZyhyXQKcxuZo9MRIj_r0OGoLPMgqLhjOrWmuz3Il_LdSkVJAvaGz5ZEQ/exec';
            
            const formData = new URLSearchParams();
            formData.append('studentName', studentName);
            formData.append('enrollmentNo', enrollmentNo);
            formData.append('startDate', startDate);
            formData.append('endDate', endDate);

           // Send the data to Google Sheets
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
                .then(response => {
                    alert('Leave recorded successfully!');
                    document.getElementById('leaveForm').reset();
                })
                .catch(error => console.error('Error!', error.message));
        });
    </script>
